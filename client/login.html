<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Back</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ebebeb;
            --card: #ffffff;
            --text-primary: #111111;
            --text-muted: #888888;
            --border: #e0e0e0;
            --btn-bg: #111111;
            --btn-text: #ffffff;
            --accent: #111111;
            --radius: 18px;
            --input-bg: #f7f7f7;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            padding: 24px;
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            display: flex;
            width: 100%;
            max-width: 960px;
            min-height: 560px;
            overflow: hidden;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.10), 0 2px 12px rgba(0, 0, 0, 0.06);
            animation: cardIn 0.6s cubic-bezier(.22, .68, 0, 1.2) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(32px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .left {
            flex: 1;
            padding: 56px 52px 44px 52px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .left-inner {
            display: flex;
            flex-direction: column;
        }

        .heading {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subheading {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 0.9rem;
            outline: none;
        }

        .forgot-row {
            text-align: right;
            margin-bottom: 22px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
        }

        .register-row {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .register-row a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .right {
            width: 46%;
            position: relative;
            overflow: hidden;
        }

        .slides {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.6s;
        }

        .slide {
            width: calc(100% / 3);
            background-size: cover;
            background-position: center;
        }

        .slide-1 {
            background-image: url('https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=900&q=80');
        }

        .slide-2 {
            background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=900&q=80');
        }

        .slide-3 {
            background-image: url('https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=900&q=80');
        }

        .dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            border: none;
            cursor: pointer;
        }

        .dot.active {
            background: #fff;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="left">
            <div class="left-inner">
                <h1 class="heading">Welcome Back!</h1>
                <p class="subheading">Sign in with your Username and Password.</p>

                <form id="loginForm">

                    <div class="form-group">
                        <input type="email" id="email" placeholder="Email" required />
                    </div>

                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password" required />
                    </div>

                    <div class="forgot-row">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button class="btn-login" type="submit">Login</button>

                </form>
            </div>

            <div class="register-row">
                Don’t have an account? <a href="register.html">Register Now</a>
            </div>
        </div>

        <div class="right">
            <div class="slides" id="slides">
                <div class="slide slide-1"></div>
                <div class="slide slide-2"></div>
                <div class="slide slide-3"></div>
            </div>
            <div class="dots" id="dots">
                <button class="dot active" data-index="0"></button>
                <button class="dot" data-index="1"></button>
                <button class="dot" data-index="2"></button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const form = document.getElementById("loginForm");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const password = document.querySelector('input[type="password"]').value;

                try {
                    const res = await fetch("http://localhost:5000/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await res.text();

                    if (data === "Login successful") {
                        alert("Login successful 😏🔥");
                        window.location.href = "home.html";
                    } else {
                        alert(data);
                    }

                } catch (err) {
                    alert("Server error");
                }
            });

            const slides = document.getElementById('slides');
            const dots = document.querySelectorAll('.dot');
            let current = 0;
            let autoTimer;

            function goTo(index) {
                current = index;
                slides.style.transform = `translateX(-${(100 / 3) * index}%)`;
                dots.forEach((d, i) => d.classList.toggle('active', i === index));
            }

            function next() {
                goTo((current + 1) % 3);
            }

            function startAuto() {
                autoTimer = setInterval(next, 3500);
            }

            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    clearInterval(autoTimer);
                    goTo(parseInt(dot.dataset.index));
                    startAuto();
                });
            });

            startAuto();
        });
    </script>

</body>

</html>
